# T-Pot: SENSOR
networks:

  subnetwork1:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.0.0.0/24


  # Macvlan сеть для IEC_61850
  # Сеть 1: Шина Станции (Station Bus)
  scada_macvlan:
      driver: macvlan
      driver_opts:
        parent: enp1s0 #для Station Bus
        macvlan_mode: bridge  
      ipam:
        config:
           - subnet: "192.168.1.0/24"      # реальная подсеть
             gateway: "192.168.1.1"        # реальный роутер
             ip_range: "192.168.1.200/29"  # Резервируем кусок адресов для Докера 



# --- Создаем шаблон настроек для Beelzebub ---
x-beelzebub-settings: &beelzebub-settings
  environment:
    - LLM_MODEL=ollama
    - LLM_HOST=http://192.168.1.173:11434
    - OLLAMA_HOST=http://192.168.1.173:11434
    - OLLAMA_URL=http://192.168.1.173:11434
    - OLLAMA_MODEL=llama3.1:8b
    - OPENAI_API_KEY=sk-ollama
  volumes:
    # Волюмы для Beelzebub (убедитесь, что пути правильные)
    - /home/artm1904/substation_honeypot/llm_honeypot/configurations/services:/opt/beelzebub/configurations/services:ro
    - /home/artm1904/substation_honeypot/llm_honeypot/industrial-samples/rag-knowledge:/opt/beelzebub/industrial-samples/rag-knowledge

    

# --- Шаблон настроек для универсального ханипота ---
x-honeypots-base: &honeypots-base
  image: ${TPOT_REPO}/honeypots:${TPOT_VERSION}
  pull_policy: ${TPOT_PULL_POLICY}
  restart: always
  stdin_open: true
  tty: true
  read_only: true
  tmpfs:
    - /tmp:uid=2000,gid=2000

        

services:

#########################################
#### DEV
#########################################
#### T-Pot Init - Never delete this!
#########################################

# T-Pot Init Service
  tpotinit:
    container_name: tpotinit
    env_file:
      - .env
    restart: always
    stop_grace_period: 60s
    tmpfs:
      - /tmp/etc:uid=2000,gid=2000
      - /tmp/:uid=2000,gid=2000
    network_mode: "host"
    cap_add:
     - NET_ADMIN
    image: ${TPOT_REPO}/tpotinit:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    volumes:
      - ${TPOT_DOCKER_COMPOSE}:/tmp/tpot/docker-compose.yml:ro
      - ${TPOT_DATA_PATH}/blackhole:/etc/blackhole
      - ${TPOT_DATA_PATH}:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro



      

##################
#### Honeypots
##################


#######################
### Substation's vIED
#######################


  ied1_xcbr:
    image: iec61850_vied_honeypot-ied1_xcbr:latest
    container_name: ied1_xcbr
    hostname: IED1_XCBR
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN  # Обязательно для работы iptables внутри
    restart: always
    
    networks:
        subnetwork1:
            ipv4_address: 10.0.0.2   # eth0 (Внутренняя сеть для симулятора и внутренних скрытых сервисов)
        scada_macvlan:
            ipv4_address: 192.168.1.202      # Внешний IP (Для хакера)
    
    volumes:
      # логи iec61850    
      - /home/artm1904/substation_honeypot/iec61850_vIED_honeypot/cfg:/cfg:ro
      - ${TPOT_DATA_PATH}/substation/log/ied1_xcbr/:/var/log/tpot
      # логи beelzebub (ssh, web-server)
      - ${TPOT_DATA_PATH}/substation/log/ied1_xcbr/key:/opt/beelzebub/configurations/key
      - ${TPOT_DATA_PATH}/substation/log/ied1_xcbr/log:/opt/beelzebub/configurations/log

   
    command: |
          /bin/sh -c "
          # 1. ДИНАМИЧЕСКИЙ ПОИСК ИНТЕРФЕЙСОВ
          DEV_INT=$$(ip -o -4 addr show | grep '10.0.0.2' | awk '{print $$2}') &&
          DEV_EXT=$$(ip -o -4 addr show | grep '192.168.1.202' | awk '{print $$2}') &&
          
          echo \"Detected Interfaces -> Internal: $$DEV_INT, External: $$DEV_EXT\" &&
          
          # Разрешаем интерфейсам принимать мультикаст (GOOSE/SV)
          ip link set $$DEV_INT promisc on &&
          ip link set $$DEV_EXT promisc on &&


          # ====================================================
          # ВНУТРЕННИЙ ФАЕРВОЛ (Ограничиваем видимость для хакера)
          # ====================================================
          iptables -F &&
          iptables -P INPUT DROP &&
          iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT &&
          iptables -A INPUT -i lo -j ACCEPT &&
          iptables -A INPUT -i $$DEV_INT -j ACCEPT && # Полностью доверяем внутренней сети симулятора
          iptables -A INPUT -i $$DEV_EXT -p icmp -j ACCEPT && # Разрешаем пинг снаружи
          iptables -A INPUT -i $$DEV_EXT -p udp -m multiport --dports 123,161 -j ACCEPT && # UDP: NTP, SNMP
          iptables -A INPUT -i $$DEV_EXT -p tcp -m multiport --dports 21,2222,80,102 -j ACCEPT && # TCP: FTP, SSH, HTTP, IEC61850 (102)
          # ====================================================

         
          # 2. АТАКИ СНАРУЖИ: Перехватываем входящий (ingress) трафик от хакера (DEV_EXT) и копируем внутрь (DEV_INT)
          tc qdisc add dev $$DEV_EXT handle ffff: ingress &&
          tc filter add dev $$DEV_EXT parent ffff: protocol all u32 match u16 0x88b8 0xffff at 12 action mirred egress mirror dev $$DEV_INT &&
          tc filter add dev $$DEV_EXT parent ffff: protocol all u32 match u16 0x88ba 0xffff at 12 action mirred egress mirror dev $$DEV_INT &&
          
          # 3. ОТВЕТЫ/ТРАФИК ИЗНУТРИ: Перехватываем исходящий (egress) трафик симулятора (DEV_INT) и копируем наружу (DEV_EXT)
          tc qdisc add dev $$DEV_INT handle 1: root prio &&
          tc filter add dev $$DEV_INT parent 1: protocol all u32 match u16 0x88b8 0xffff at 12 action mirred egress mirror dev $$DEV_EXT &&
          tc filter add dev $$DEV_INT parent 1: protocol all u32 match u16 0x88ba 0xffff at 12 action mirred egress mirror dev $$DEV_EXT &&
          
          # 4. ЗАПУСК СЕРВЕРА (Привязываем к внутреннему интерфейсу)
          # TCP порт 102 откроется везде автоматически (0.0.0.0)
          /srv/libiec61850_server $$DEV_EXT 102 /cfg/IED1_XCBR.cfg /cfg/IED1_XCBR.ext R
          "




