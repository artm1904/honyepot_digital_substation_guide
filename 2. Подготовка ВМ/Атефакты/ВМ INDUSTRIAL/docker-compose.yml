  simulator:
    image: iec61850_vied_honeypot-simulator:latest 
    container_name: simulator
    hostname: simulator
    privileged: true
    cap_add:
        - NET_RAW
        - NET_ADMIN  
        - SYS_PTRACE
    volumes:
      # Конфиги со схемами сети
      - /home/artm1904/substation_honeypot/iec61850_vIED_honeypot/scd:/srv/scd

      # логи beelzebub (ssh, web-server)
      - ${TPOT_DATA_PATH}/substation/log/simulator/key:/opt/beelzebub/configurations/key
      - ${TPOT_DATA_PATH}/substation/log/simulator/log:/opt/beelzebub/configurations/log

      
    networks:
      subnetwork1:
        ipv4_address: 10.0.0.254
      scada_macvlan:
        ipv4_address: 192.168.1.206
    ports:
        - "5010:5010"   # ИСПРАВЛЕНО!
    security_opt:
      - seccomp:unconfined
    command: |
      /bin/sh -c "
            
      # Определяем интерфейсы
      DEV_INT=$$(ip -o -4 addr show | grep '10.0.0.254' | awk '{print $$2}') &&
      DEV_EXT=$$(ip -o -4 addr show | grep '192.168.1.206' | awk '{print $$2}') &&

      # Разрешаем интерфейсам принимать мультикаст (GOOSE/SV)
      ip link set $$DEV_INT promisc on &&
      ip link set $$DEV_EXT promisc on &&
      
      # Зеркалируем ИСХОДЯЩИЙ MMS-трафик (TCP порт 102) наружу
      tc qdisc add dev $$DEV_INT handle 1: root prio &&
      tc filter add dev $$DEV_INT parent 1: protocol ip u32 match ip protocol 6 0xff match ip dport 102 0xffff action mirred egress mirror dev $$DEV_EXT &&
      tc filter add dev $$DEV_INT parent 1: protocol ip u32 match ip protocol 6 0xff match ip sport 102 0xffff action mirred egress mirror dev $$DEV_EXT &&
      
      # Зеркалируем ВХОДЯЩИЙ MMS-трафик наружу
      tc qdisc add dev $$DEV_INT handle ffff: ingress &&
      tc filter add dev $$DEV_INT parent ffff: protocol ip u32 match ip protocol 6 0xff match ip dport 102 0xffff action mirred egress mirror dev $$DEV_EXT &&
      tc filter add dev $$DEV_INT parent ffff: protocol ip u32 match ip protocol 6 0xff match ip sport 102 0xffff action mirred egress mirror dev $$DEV_EXT &&
      
      # Запускаем штатный процесс
      python3 webAPI.py
      "



